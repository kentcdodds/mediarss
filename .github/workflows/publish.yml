name: 🚀 Publish
on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  lint:
    name: ⬣ Lint
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔬 Lint
        run: npm run lint:check

  typecheck:
    name: ʦ TypeCheck
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔎 Type check
        run: npm run typecheck

  test:
    name: 🧪 Test
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

  build:
    name: 🐳 Build
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: mediarss:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: 🧪 Smoke test
        run: |
          # Start the container
          docker run -d --name smoke-test -p 22050:22050 mediarss:smoke-test

          # Wait for the container to be ready (max 30 seconds)
          for i in {1..30}; do
            if curl -sf http://localhost:22050/admin/health > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              curl -s http://localhost:22050/admin/health | jq .
              docker stop smoke-test
              docker rm smoke-test
              exit 0
            fi
            echo "Waiting for container... ($i/30)"
            sleep 1
          done

          echo "❌ Health check failed!"
          docker logs smoke-test
          docker stop smoke-test
          docker rm smoke-test
          exit 1

  publish:
    name: 🚀 Publish
    runs-on: ubuntu-22.04
    needs: [lint, typecheck, test, build]
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 📝 Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mediarss
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}
